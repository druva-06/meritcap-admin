name: Deploy Admin Frontend

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/meritcap-admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          echo "env=prod" >> $GITHUB_OUTPUT
          echo "api_url=https://api.meritcap.com" >> $GITHUB_OUTPUT
          echo "vps_host=${{ secrets.PROD_VPS_HOST }}" >> $GITHUB_OUTPUT
          echo "namespace=prod" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.env.outputs.api_url }} \
            -t $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }} .
          docker tag $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }} \
                     $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-latest
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:${{ steps.env.outputs.env }}-latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ steps.env.outputs.vps_host }}
          username: deployer
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.DEPLOYER_PASSWORD }}
          timeout: 120s
          command_timeout: 20m
          envs: GHCR_USER,GHCR_TOKEN
          script: |
            set -e
            microk8s kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username="$GHCR_USER" \
              --docker-password="$GHCR_TOKEN" \
              -n ${{ steps.env.outputs.namespace }} \
              --dry-run=client -o yaml | microk8s kubectl apply -f -
            microk8s kubectl patch deployment meritcap-admin -n ${{ steps.env.outputs.namespace }} --type='merge' -p '{"spec":{"template":{"spec":{"imagePullSecrets":[{"name":"ghcr-secret"}]}}}}'
            microk8s kubectl patch deployment meritcap-admin -n ${{ steps.env.outputs.namespace }} --type='merge' -p '{"spec":{"strategy":{"type":"RollingUpdate","rollingUpdate":{"maxUnavailable":1,"maxSurge":1}}}}'
            microk8s kubectl set image deployment/meritcap-admin \
              meritcap-admin=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.env }}-${{ github.sha }} \
              -n ${{ steps.env.outputs.namespace }}
            if ! microk8s kubectl rollout status deployment/meritcap-admin -n ${{ steps.env.outputs.namespace }} --timeout=600s; then
              microk8s kubectl get deployment meritcap-admin -n ${{ steps.env.outputs.namespace }} -o wide
              microk8s kubectl get pods -n ${{ steps.env.outputs.namespace }} -l app=meritcap-admin -o wide
              microk8s kubectl describe deployment meritcap-admin -n ${{ steps.env.outputs.namespace }}
              microk8s kubectl describe pods -n ${{ steps.env.outputs.namespace }} -l app=meritcap-admin
              exit 1
            fi
            microk8s kubectl get pods -n ${{ steps.env.outputs.namespace }} -l app=meritcap-admin
